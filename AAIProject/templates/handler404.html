<!DOCTYPE html>
<html lang="en">

    <style>
        body {
            background: linear-gradient(135deg, #f8fafc, #e5e7eb);
        }
    </style>

            <p class="text-lg text-gray-600 mb-6">Oops! The page you are looking for does not exist. It might have been moved or deleted.</p>
            <a href="/" class="bg-blue-500 text-white px-6 py-2 rounded hover:bg-blue-600">Go Back to Home</a>

                <p class="text-sm text-gray-500">Need help? Contact us at <a href="mailto:support@automatedai.com" class="text-blue-500 underline">support@automatedai.com</a>.</p>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-auto">
        <div class="container mx-auto text-center">
            <p>&copy; 2025 Automated AI. All Rights Reserved.</p>
            <nav class="flex justify-center space-x-4 mt-4">
                <a href="/privacy" class="hover:underline">Privacy Policy</a>
                <a href="/terms" class="hover:underline">Terms of Service</a>
                <a href="/contact" class="hover:underline">Contact Us</a>
            </nav>
        </div>
    </footer>
</body>
</html>
